<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snocky AI — Ultimate Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #0f0f13;
            overflow: hidden;
            color: #ededee;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.light-mode {
            background: #f0f0f5;
            color: #1a1a2e;
        }

        body.light-mode .ai .bubble {
            background: rgba(255,255,255,0.9);
            color: #1a1a2e;
        }

        body.light-mode .input-area,
        body.light-mode .header {
            background: rgba(255,255,255,0.8);
        }

        body.light-mode textarea {
            background: #ffffff;
            color: #1a1a2e;
            border-color: #ddd;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: rgba(15, 15, 19, 0.3);
        }

        .header {
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(15,15,19,0.6);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #a78bfa, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(0.95);
        }

        .logout-btn {
            background: rgba(239,68,68,0.8);
        }

        .logout-btn:hover {
            background: #ef4444;
        }

        /* Quick Buttons */
        .quick-buttons {
            padding: 0.5rem 1rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .quick-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: rgba(167,139,250,0.3);
            transform: translateY(-2px);
        }

        body.light-mode .quick-btn {
            background: rgba(0,0,0,0.05);
            color: #1a1a2e;
        }

        /* Quote Bar */
        .quote-bar {
            padding: 0.3rem 1rem;
            text-align: center;
            font-size: 0.7rem;
            color: #a78bfa;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            font-style: italic;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            display: flex;
            gap: 0.8rem;
            animation: fadeInUp 0.3s ease;
        }

        .message.user { justify-content: flex-end; }
        .message.ai { justify-content: flex-start; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .user .avatar { background: #2a2a35; }
        body.light-mode .user .avatar { background: #cbd5e1; }

        .bubble {
            max-width: 75%;
            padding: 0.7rem 1rem;
            border-radius: 1.2rem;
            line-height: 1.4;
            font-size: 0.88rem;
        }

        .ai .bubble {
            background: rgba(30,30,40,0.8);
            backdrop-filter: blur(4px);
            border-bottom-left-radius: 0.25rem;
        }

        .user .bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .input-area {
            padding: 1rem;
            background: rgba(15,15,19,0.8);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 0.6rem;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: #1e1e24;
            border: 1px solid #2a2a35;
            border-radius: 1.5rem;
            padding: 0.7rem 1rem;
            font-family: inherit;
            font-size: 0.88rem;
            color: white;
            resize: none;
            outline: none;
            max-height: 100px;
            min-height: 44px;
            transition: all 0.2s;
        }

        textarea:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 2px rgba(167,139,250,0.2);
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            border: none;
            border-radius: 1.5rem;
            padding: 0.7rem 1.2rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { transform: scale(0.98); opacity: 0.9; }

        .mic-btn {
            background: #2a2a35;
            padding: 0.7rem;
            border-radius: 50%;
            width: 44px;
            height: 44px;
        }

        .mic-btn.listening {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        .speak-btn {
            background: #10b981;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-track { background: #1a1a22; }
        .chat-container::-webkit-scrollbar-thumb { background: #a78bfa; border-radius: 10px; }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .suggest-card {
            background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(5,150,105,0.1));
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 0.5rem;
            border: 1px solid rgba(16,185,129,0.4);
            animation: slideIn 0.4s ease;
        }

        .apk-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 768px) {
            .header { padding: 1rem 2rem; }
            .header h1 { font-size: 1.6rem; }
            .bubble { font-size: 0.95rem; padding: 0.8rem 1.2rem; }
            .chat-container { padding: 1.5rem; }
        }

        @media (max-width: 600px) {
            .quick-btn { font-size: 0.7rem; padding: 0.3rem 0.8rem; }
            .icon-btn { padding: 0.3rem 0.8rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="app" id="mainApp">
        <div class="header">
            <h1>⚡ SNOCKY AI</h1>
            <div class="header-actions">
                <button class="icon-btn" id="themeToggleBtn">🌓 Theme</button>
                <button class="icon-btn" id="clearHistoryBtn">🗑️ Clear</button>
                <button class="icon-btn logout-btn" id="logoutBtn">🚪 Logout</button>
            </div>
        </div>

        <div class="quote-bar" id="quoteBar">✨ "Believe you can and you're halfway there." — Theodore Roosevelt</div>

        <div class="quick-buttons" id="quickButtons">
            <button class="quick-btn" data-problem="phone addiction ho gayi">📱 Phone Addiction</button>
            <button class="quick-btn" data-problem="padhai mein focus nahi aa raha">📚 Study Focus</button>
            <button class="quick-btn" data-problem="bahut stress ho raha hai">😰 Stress Relief</button>
            <button class="quick-btn" data-problem="bhook lagi hai jaldi khana hai">🍔 Quick Food</button>
            <button class="quick-btn" data-problem="procrastinate kar raha hoon">⏳ Procrastination</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message ai">
                <div class="avatar">⚡</div>
                <div class="bubble">Kya haal hai bhai? Main Snocky — tera AI dost. Problem bata, solution dunga. Voice se bhi bol sakta hai, mai bol kar bhi sunaunga! 💪</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Kuch bhi likh ya mic dabake bol..." rows="1"></textarea>
                <button id="speakBtn" class="icon-btn speak-btn" style="border-radius:50%; width:44px;">🔊</button>
                <button id="micBtn" class="mic-btn">🎤</button>
                <button id="sendBtn">→</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 3D Background
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0f13);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        const group = new THREE.Group();
        const geo = new THREE.IcosahedronGeometry(0.8, 0);
        const mat = new THREE.MeshStandardMaterial({ color: 0xa78bfa, emissive: 0x4c1d95, emissiveIntensity: 0.3 });
        const core = new THREE.Mesh(geo, mat);
        group.add(core);
        const wireframe = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, transparent: true, opacity: 0.2 }));
        wireframe.scale.set(1.2, 1.2, 1.2);
        group.add(wireframe);
        
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(1000 * 3);
        for (let i = 0; i < 1000; i++) {
            positions[i*3] = (Math.random() - 0.5) * 14;
            positions[i*3+1] = (Math.random() - 0.5) * 9;
            positions[i*3+2] = (Math.random() - 0.5) * 12 - 5;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const stars = new THREE.Points(particlesGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.03, transparent: true, opacity: 0.4 }));
        group.add(stars);
        scene.add(group);
        
        const light1 = new THREE.PointLight(0x3b82f6, 0.8);
        light1.position.set(2, 2, 3);
        scene.add(light1);
        const light2 = new THREE.PointLight(0xa78bfa, 0.6);
        light2.position.set(-2, 1, 4);
        scene.add(light2);
        scene.add(new THREE.AmbientLight(0x1a1a2e));
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = false;
        
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.003;
            group.rotation.x += 0.002;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============ PREMIUM FEATURES ============
        
        const quotes = [
            "✨ Believe you can and you're halfway there. — Theodore Roosevelt",
            "📚 The expert in anything was once a beginner.",
            "💪 Your only limit is your mind.",
            "🎯 Focus on the goal, not the obstacle.",
            "🧠 Small daily improvements lead to big results.",
            "⚡ Don't wait for opportunity. Create it.",
            "🌟 You didn't come this far to only come this far.",
            "🔋 Rest if you must, but don't you quit.",
            "💡 The future depends on what you do today.",
            "🎓 Education is the most powerful weapon.",
        ];
        
        function setRandomQuote() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quoteBar').innerHTML = `✨ "${randomQuote}"`;
        }
        setRandomQuote();
        
        let isDarkMode = true;
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.classList.remove('light-mode');
                document.body.style.background = '#0f0f13';
            } else {
                document.body.classList.add('light-mode');
                document.body.style.background = '#f0f0f5';
            }
        });
        
        // Text-to-Speech
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null;
        
        function speakText(text) {
            if (currentUtterance) speechSynthesis.cancel();
            currentUtterance = new SpeechSynthesisUtterance(text);
            currentUtterance.lang = 'hi-IN';
            currentUtterance.rate = 0.9;
            speechSynthesis.speak(currentUtterance);
        }
        
        function vibrate() {
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
        }
        
        let audioCtx = null;
        function playTypingSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.05;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }
        
        // ============ CHAT SYSTEM ============
        const GROQ_API_KEY = "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";
        const APK_URL = "https://static.apkclaw.net/apk/ApkClaw_v0.0.1.apk";
        
        const chatContainerDiv = document.getElementById('chatContainer');
        const textarea = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const speakBtn = document.getElementById('speakBtn');
        
        let isApkSuggested = false;
        let conversationHistory = JSON.parse(localStorage.getItem('snockyChatHistory')) || [
            { role: "system", content: "Tu Snocky hai — ek friendly, real dost. Hinglish mein baat kar. Short aur helpful jawab de. Jab user specifically 'phone addiction' ya 'distraction' ki baat kare tabhi 'ApkClaw' suggest kar warna mat kar." }
        ];
        
        function loadMessagesFromHistory() {
            chatContainerDiv.innerHTML = '';
            let hasUserMessage = false;
            for (let msg of conversationHistory) {
                if (msg.role === 'user') {
                    addMessageToUI('user', msg.content);
                    hasUserMessage = true;
                } else if (msg.role === 'assistant' && msg.content) {
                    addMessageToUI('ai', msg.content);
                }
            }
            if (!hasUserMessage) {
                addMessageToUI('ai', 'Kya haal hai bhai? Main Snocky — tera AI dost. Problem bata, solution dunga! 💪');
            }
        }
        
        function addMessageToUI(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="avatar">${role === 'ai' ? '⚡' : '你'}</div><div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            chatContainerDiv.appendChild(messageDiv);
            chatContainerDiv.scrollTop = chatContainerDiv.scrollHeight;
        }
        
        function saveChatHistory() {
            localStorage.setItem('snockyChatHistory', JSON.stringify(conversationHistory));
        }
        
        function addApkSuggestCard() {
            if (document.getElementById('apkCard') || isApkSuggested) return;
            const cardDiv = document.createElement('div');
            cardDiv.className = 'suggest-card';
            cardDiv.id = 'apkCard';
            cardDiv.innerHTML = `<h4>📱 Snocky Suggests — ApkClaw</h4><p>Yeh app phone lock karega, distractions hatayega, focus mode dega. Bilkul free hai.</p><button class="apk-btn" id="downloadApkBtn">⬇️ DOWNLOAD ApkClaw (Direct)</button>`;
            chatContainerDiv.appendChild(cardDiv);
            document.getElementById('downloadApkBtn')?.addEventListener('click', () => window.open(APK_URL, '_blank'));
            isApkSuggested = true;
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `<div class="avatar">⚡</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            chatContainerDiv.appendChild(typingDiv);
            chatContainerDiv.scrollTop = chatContainerDiv.scrollHeight;
            playTypingSound();
        }
        
        function hideTyping() { document.getElementById('typingIndicator')?.remove(); }
        
        // Check if user is asking about phone addiction specifically
        function isPhoneAddictionQuery(msg) {
            const lower = msg.toLowerCase();
            const addictionKeywords = ['phone addiction', 'phone ki lat', 'phone ki aadat', 'distraction', 'screen time', 'mobile addiction', 'phone se chutkara'];
            return addictionKeywords.some(keyword => lower.includes(keyword));
        }
        
        async function sendMessage(messageText = null) {
            const userMessage = messageText || textarea.value.trim();
            if (!userMessage) return;
            
            vibrate();
            addMessageToUI('user', userMessage);
            textarea.value = '';
            
            conversationHistory.push({ role: "user", content: userMessage });
            saveChatHistory();
            
            showTyping();
            
            // Only show ApkClaw if user is specifically asking about phone addiction
            const shouldShowApk = isPhoneAddictionQuery(userMessage);
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: conversationHistory.slice(-10), temperature: 0.9, max_tokens: 250 })
                });
                hideTyping();
                const data = await response.json();
                let reply = data.choices?.[0]?.message?.content || "❌ Error, try again";
                
                conversationHistory.push({ role: "assistant", content: reply });
                saveChatHistory();
                addMessageToUI('ai', reply);
                
                if (shouldShowApk && !isApkSuggested) {
                    setTimeout(() => addApkSuggestCard(), 500);
                }
            } catch (error) {
                hideTyping();
                addMessageToUI('ai', '❌ Internet check kar bhai');
            }
        }
        
        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            conversationHistory = [{ role: "system", content: "Tu Snocky hai — ek friendly, real dost. Hinglish mein baat kar." }];
            isApkSuggested = false;
            saveChatHistory();
            chatContainerDiv.innerHTML = '';
            addMessageToUI('ai', 'Chat history clear ho gayi! Ab nayi baat shuru karte hain 💪');
        });
        
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const problem = btn.getAttribute('data-problem');
                sendMessage(problem);
            });
        });
        
        speakBtn.addEventListener('click', () => {
            const lastAIMessage = Array.from(chatContainerDiv.querySelectorAll('.message.ai .bubble')).pop();
            if (lastAIMessage) speakText(lastAIMessage.innerText);
            else speakText("Koi message nahi hai bhai, kuch pucho pehle");
        });
        
        let isListening = false;
        let recognition = null;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onresult = (event) => {
                textarea.value = event.results[0][0].transcript;
                micBtn.classList.remove('listening');
                isListening = false;
                setTimeout(() => sendMessage(), 200);
            };
            recognition.onend = () => {
                micBtn.classList.remove('listening');
                isListening = false;
            };
        }
        
        micBtn.addEventListener('click', () => {
            if (!recognition) {
                addMessageToUI('ai', '❌ Voice support nahi. Chrome use kar.');
                return;
            }
            if (isListening) {
                recognition.stop();
                micBtn.classList.remove('listening');
                isListening = false;
            } else {
                recognition.start();
                micBtn.classList.add('listening');
                isListening = true;
            }
        });
        
        sendBtn.addEventListener('click', () => sendMessage());
        textarea.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        loadMessagesFromHistory();
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('snockyUser');
            localStorage.removeItem('snockyChatHistory');
            window.location.reload();
        });
        
        console.log('🔥 Snocky AI Ultimate — ApkClaw only on Phone Addiction!');
    </script>
</body>
</html>
