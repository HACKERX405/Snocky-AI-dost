<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f13">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Snocky AI — Super Sexy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
        }

        @media (max-width: 480px) {
            html {
                font-size: 14px;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #0a0a0f;
            overflow: hidden;
            color: #ededee;
            transition: background 0.3s ease;
        }

        body.light-mode {
            background: #f0f0f5;
        }

        /* Animated Gradient Background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 50%, rgba(167, 139, 250, 0.15), transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.15), transparent 50%);
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: rgba(10, 10, 15, 0.3);
            backdrop-filter: blur(2px);
        }

        /* Login Overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .login-card {
            background: rgba(25, 25, 40, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 350px;
            border: 1px solid rgba(167, 139, 250, 0.3);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.2);
            animation: floatIn 0.5s ease;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-card h1 {
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-card p {
            text-align: center;
            color: #8b8b9e;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .login-card input {
            width: 100%;
            background: rgba(30, 30, 45, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .login-card input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 2px rgba(167,139,250,0.2);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            border: none;
            border-radius: 1rem;
            padding: 0.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .guest-btn {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.8rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
        }

        /* Header */
        .header {
            padding: 0.8rem 1rem;
            background: rgba(15, 15, 25, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 20;
        }

        .logo h1 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #a78bfa, #3b82f6, #10b981);
            background-size: 300% 300%;
            animation: gradientShift 6s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo p {
            font-size: 0.55rem;
            color: #a78bfa;
        }

        .header-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.35rem 0.8rem;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .backchod-btn {
            background: linear-gradient(135deg, #ef4444, #f97316);
            border: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
        }

        /* Quote Bar */
        .quote-bar {
            padding: 0.35rem;
            text-align: center;
            font-size: 0.6rem;
            background: linear-gradient(90deg, transparent, rgba(167,139,250,0.1), transparent);
            animation: fadeInOut 8s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Quick Buttons - Horizontal Scroll */
        .quick-buttons {
            padding: 0.5rem 0.8rem;
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .quick-buttons::-webkit-scrollbar {
            display: none;
        }

        .quick-btn {
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(167,139,250,0.1));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            white-space: nowrap;
            cursor: pointer;
            color: white;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .quick-btn:active {
            transform: scale(0.95);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%;
        }

        .message {
            display: flex;
            gap: 0.7rem;
            animation: messagePop 0.3s ease;
        }

        @keyframes messagePop {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-bottom-right-radius: 0.2rem;
            box-shadow: 0 5px 15px rgba(59,130,246,0.3);
        }

        .message.ai .bubble {
            background: rgba(30, 30, 45, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 0.2rem;
        }

        .avatar {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(167,139,250,0.3);
            animation: avatarFloat 3s ease infinite;
        }

        @keyframes avatarFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .user .avatar {
            background: linear-gradient(135deg, #6b7280, #9ca3af);
            box-shadow: none;
        }

        .bubble {
            max-width: 75%;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            line-height: 1.4;
            font-size: 0.85rem;
            word-wrap: break-word;
        }

        @media (max-width: 480px) {
            .bubble {
                max-width: 85%;
                font-size: 0.9rem;
                padding: 0.7rem 1rem;
            }
            .avatar {
                width: 2rem;
                height: 2rem;
            }
        }

        /* Image message */
        .image-message {
            margin-top: 0.5rem;
            max-width: 200px;
            border-radius: 1rem;
            cursor: pointer;
        }

        .image-message img {
            width: 100%;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Input Area - BIG PROMPT BAR */
        .input-area {
            padding: 0.8rem;
            background: rgba(15, 15, 25, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: max(0.8rem, env(safe-area-inset-bottom, 0.8rem));
        }

        .input-wrapper {
            width: 100%;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* BIG TEXTAREA for MOBILE */
        textarea {
            flex: 1;
            background: rgba(30, 30, 45, 0.95);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 2rem;
            padding: 0.9rem 1.2rem;
            font-family: inherit;
            font-size: 1rem;
            color: white;
            resize: none;
            outline: none;
            min-height: 3.2rem;
            line-height: 1.3;
        }

        @media (max-width: 480px) {
            textarea {
                padding: 1rem 1.2rem;
                font-size: 1rem;
                min-height: 3.5rem;
            }
        }

        textarea:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
        }

        /* Action Buttons */
        .action-btn {
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        .mic-btn, .speak-btn, .img-btn {
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 480px) {
            .mic-btn, .speak-btn, .img-btn {
                width: 3.2rem;
                height: 3.2rem;
            }
        }

        .img-btn {
            background: #8b5cf6;
        }

        .speak-btn {
            background: #10b981;
        }

        .mic-btn.listening {
            background: #ef4444;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 #ef4444; }
            50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        /* Suggest Card */
        .suggest-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.1));
            border-radius: 1rem;
            padding: 0.7rem;
            margin-top: 0.5rem;
            border: 1px solid rgba(16, 185, 129, 0.4);
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 3px rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }
        }

        .apk-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 5px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat-container::-webkit-scrollbar {
            width: 3px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #a78bfa;
            border-radius: 10px;
        }

        body.light-mode .bubble,
        body.light-mode .ai .bubble {
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
        }
        body.light-mode textarea {
            background: white;
            color: #1a1a2e;
            border-color: #ddd;
        }
        body.light-mode .input-area,
        body.light-mode .header {
            background: rgba(255, 255, 255, 0.8);
        }

        @media (min-width: 1024px) {
            .chat-container {
                max-width: 800px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div id="canvas-container"></div>

    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <h1>⚡ SNOCKY AI</h1>
            <p>super sexy • backchod • intelligent</p>
            <input type="text" id="loginName" placeholder="Your name">
            <button class="login-btn" id="loginSubmitBtn">🚀 Enter</button>
            <button class="guest-btn" id="guestLoginBtn">👤 Continue as Guest</button>
        </div>
    </div>

    <div class="app" id="mainApp" style="display: none;">
        <div class="header">
            <div class="logo">
                <h1>⚡ SNOCKY AI</h1>
                <p id="userNameDisplay">bhai</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn backchod-btn" id="backchodModeBtn">🔥 BACKCHOD MODE</button>
                <button class="icon-btn" id="themeToggleBtn">🎨 Theme</button>
                <button class="icon-btn" id="clearHistoryBtn">🗑️ Clear</button>
            </div>
        </div>

        <div class="quote-bar" id="quoteBar">💀 "Bhai wala pyaar, backchod style" — Snocky</div>

        <div class="quick-buttons">
            <button class="quick-btn" data-problem="kaise ho bhai">😎 Kaise ho?</button>
            <button class="quick-btn" data-problem="padhai nahi ho rahi">📚 Padhai</button>
            <button class="quick-btn" data-problem="phone addiction">📱 Phone Addiction</button>
            <button class="quick-btn" data-problem="stress hai">😰 Stress</button>
            <button class="quick-btn" data-problem="girlfriend nahi">💔 Girlfriend</button>
            <button class="quick-btn" data-problem="draw a cute cat">🐱 Draw Cat</button>
            <button class="quick-btn" data-problem="tu pagal hai">🤪 Pagal hai?</button>
            <button class="quick-btn" data-problem="koi joke suna">😂 Joke</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message ai">
                <div class="avatar">⚡</div>
                <div class="bubble">Kya haal hai bhai? Main Snocky — tera super sexy backchod dost. Gaali dunga thoda, mazak udaaunga, par help bhi karunga. 🔥 MODE: <span id="modeIndicator">NORMAL</span></div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Bol bhai, kya backchodi hai..." rows="1"></textarea>
                <button id="imgBtn" class="action-btn img-btn">🎨</button>
                <button id="speakBtn" class="action-btn speak-btn">🔊</button>
                <button id="micBtn" class="action-btn mic-btn">🎤</button>
                <button id="sendBtn" class="action-btn">Send</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 3D Background
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        const group = new THREE.Group();
        const geo = new THREE.IcosahedronGeometry(0.8, 0);
        const mat = new THREE.MeshStandardMaterial({ color: 0xa78bfa, emissive: 0x4c1d95, emissiveIntensity: 0.3 });
        const core = new THREE.Mesh(geo, mat);
        group.add(core);
        
        const wireframe = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, transparent: true, opacity: 0.2 }));
        wireframe.scale.set(1.2, 1.2, 1.2);
        group.add(wireframe);
        
        const particleCount = 800;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 14;
            positions[i*3+1] = (Math.random() - 0.5) * 9;
            positions[i*3+2] = (Math.random() - 0.5) * 12 - 5;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const stars = new THREE.Points(particlesGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.03, transparent: true, opacity: 0.4 }));
        group.add(stars);
        
        scene.add(group);
        
        const light1 = new THREE.PointLight(0x3b82f6, 0.8);
        light1.position.set(2, 2, 3);
        scene.add(light1);
        const light2 = new THREE.PointLight(0xa78bfa, 0.6);
        light2.position.set(-2, 1, 4);
        scene.add(light2);
        scene.add(new THREE.AmbientLight(0x1a1a2e));
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.enableZoom = false;
        
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.002;
            group.rotation.x += 0.001;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============ APP LOGIC ============
        
        let backchodMode = localStorage.getItem('backchodMode') === 'true';
        let currentUserName = localStorage.getItem('snockyUserName') || '';
        
        // Login logic
        const loginOverlay = document.getElementById('loginOverlay');
        const mainApp = document.getElementById('mainApp');
        const userNameDisplay = document.getElementById('userNameDisplay');
        
        function loginUser(name) {
            currentUserName = name;
            localStorage.setItem('snockyUserName', name);
            loginOverlay.style.display = 'none';
            mainApp.style.display = 'flex';
            userNameDisplay.innerText = name;
            addMessageToUI('ai', `Kya haal hai ${name} bhai! Main Snocky — tera super sexy backchod dost. 🔥 MODE: ${backchodMode ? 'BACKCHOD' : 'NORMAL'}`);
        }
        
        document.getElementById('loginSubmitBtn').addEventListener('click', () => {
            const name = document.getElementById('loginName').value.trim();
            if (name) loginUser(name);
            else alert('Kuch naam likh bhai');
        });
        
        document.getElementById('guestLoginBtn').addEventListener('click', () => {
            loginUser('Guest');
        });
        
        if (currentUserName) {
            loginOverlay.style.display = 'none';
            mainApp.style.display = 'flex';
            userNameDisplay.innerText = currentUserName;
        }
        
        // Backchod Mode Toggle
        const backchodBtn = document.getElementById('backchodModeBtn');
        const modeIndicator = document.getElementById('modeIndicator');
        
        function updateModeUI() {
            if (backchodMode) {
                backchodBtn.style.background = 'linear-gradient(135deg, #ef4444, #f97316)';
                backchodBtn.style.border = 'none';
                modeIndicator.innerText = 'BACKCHOD 🔥';
                modeIndicator.style.color = '#f97316';
            } else {
                backchodBtn.style.background = 'rgba(255,255,255,0.08)';
                modeIndicator.innerText = 'NORMAL';
                modeIndicator.style.color = '#a78bfa';
            }
        }
        
        backchodBtn.addEventListener('click', () => {
            backchodMode = !backchodMode;
            localStorage.setItem('backchodMode', backchodMode);
            updateModeUI();
            addMessageToUI('ai', backchodMode ? '🔥 BACKCHOD MODE ON! Ab gali dunga bhai wala pyaar se 😎' : '😇 NORMAL MODE ON. Ab seedha baat karta hu');
        });
        
        updateModeUI();
        
        // Quotes
        const quotes = [
            "💀 Backchod mode on hai toh dhyan rakhna",
            "🔥 Gaali dunga par pyaar se",
            "😎 Bhai wala pyaar, backchod style",
            "🤣 Tu pagal hai, par mera pagal hai"
        ];
        
        setInterval(() => {
            document.getElementById('quoteBar').innerHTML = `✨ "${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        }, 30000);
        
        // Theme
        let isDarkMode = true;
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode', !isDarkMode);
        });
        
        function speakText(text) {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
        
        function vibrate() {
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
        }
        
        const GROQ_API_KEY = "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";
        const APK_URL = "https://static.apkclaw.net/apk/ApkClaw_v0.0.1.apk";
        
        const chatContainerDiv = document.getElementById('chatContainer');
        const textarea = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const speakBtn = document.getElementById('speakBtn');
        const imgBtn = document.getElementById('imgBtn');
        
        let isApkSuggested = false;
        let conversationHistory = JSON.parse(localStorage.getItem('snockyFullHistory')) || [];
        
        function addMessageToUI(role, text, isImage = false, imageUrl = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            let content = '';
            if (isImage && imageUrl) {
                content = `<div class="bubble">${text}<br><div class="image-message"><img src="${imageUrl}" alt="Generated" loading="lazy"></div></div>`;
            } else {
                content = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            }
            messageDiv.innerHTML = `<div class="avatar">${role === 'ai' ? '⚡' : '你'}</div>${content}`;
            chatContainerDiv.appendChild(messageDiv);
            chatContainerDiv.scrollTop = chatContainerDiv.scrollHeight;
        }
        
        function saveHistory() {
            localStorage.setItem('snockyFullHistory', JSON.stringify(conversationHistory));
        }
        
        function loadHistory() {
            chatContainerDiv.innerHTML = '';
            for (let msg of conversationHistory) {
                if (msg.role === 'user') {
                    addMessageToUI('user', msg.content);
                } else if (msg.role === 'assistant' && msg.content) {
                    addMessageToUI('ai', msg.content);
                }
            }
        }
        
        function addApkCard() {
            if (document.getElementById('apkCard')) return;
            const cardDiv = document.createElement('div');
            cardDiv.className = 'suggest-card';
            cardDiv.id = 'apkCard';
            cardDiv.innerHTML = `<h4 style="color:#10b981;">📱 ApkClaw</h4><button class="apk-btn" id="downloadBtn">⬇️ Download</button>`;
            chatContainerDiv.appendChild(cardDiv);
            document.getElementById('downloadBtn')?.addEventListener('click', () => window.open(APK_URL, '_blank'));
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `<div class="avatar">⚡</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            chatContainerDiv.appendChild(typingDiv);
            chatContainerDiv.scrollTop = chatContainerDiv.scrollHeight;
        }
        
        function hideTyping() {
            document.getElementById('typingIndicator')?.remove();
        }
        
        function isDrawingRequest(msg) {
            const lower = msg.toLowerCase();
            const keywords = ['draw', 'generate', 'make', 'create', 'picture', 'image', 'cat', 'dog', 'meme'];
            return keywords.some(k => lower.includes(k));
        }
        
        function extractPrompt(msg) {
            let prompt = msg;
            const remove = ['draw', 'generate', 'make a', 'create a', 'picture of', 'image of', 'please'];
            remove.forEach(w => prompt = prompt.replace(new RegExp(w, 'gi'), ''));
            return prompt.trim().substring(0, 200) || msg;
        }
        
        async function generateImage(prompt) {
            return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&nologo=true`;
        }
        
        async function getAIResponse(msg) {
            const modePrompt = backchodMode ? "You are Snocky in BACKCHOD MODE. Give limited gaali (bhadwa, chutiya, madarchod - bhai wala pyaar). Be funny, sarcastic, but helpful. Reply in Hinglish. Example: 'Bhai teri problem sun li. Ab ye kar... nahi hua toh teri gaand maarunga 😂'" : "You are Snocky in NORMAL MODE. Be friendly, helpful, no gaali. Reply in Hinglish.";
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: "system", content: modePrompt }, { role: "user", content: msg }], temperature: 0.9, max_tokens: 250 })
                });
                const data = await response.json();
                return data.choices?.[0]?.message?.content || "Bhai main sun raha hu. Bol kya chahiye 💙";
            } catch (error) {
                return "❌ Internet check kar bhai. Phir se bol 😅";
            }
        }
        
        async function sendMessage(messageText = null, forceImage = false) {
            let userMsg = messageText || textarea.value.trim();
            if (!userMsg) return;
            
            vibrate();
            addMessageToUI('user', userMsg);
            textarea.value = '';
            textarea.style.height = 'auto';
            
            conversationHistory.push({ role: "user", content: userMsg });
            saveHistory();
            
            const isDraw = forceImage || isDrawingRequest(userMsg);
            
            if (isDraw) {
                const prompt = extractPrompt(userMsg);
                addMessageToUI('ai', `🎨 "${prompt}" — bana raha hu...`);
                try {
                    const imgUrl = await generateImage(prompt);
                    addMessageToUI('ai', `Le bhai, tera kaam complete 🖼️✨`, true, imgUrl);
                    conversationHistory.push({ role: "assistant", content: `[Generated image: ${prompt}]` });
                    saveHistory();
                } catch (err) {
                    addMessageToUI('ai', '❌ Image nahi bani bhai. Phir try kar');
                }
                return;
            }
            
            showTyping();
            const reply = await getAIResponse(userMsg);
            hideTyping();
            addMessageToUI('ai', reply);
            conversationHistory.push({ role: "assistant", content: reply });
            saveHistory();
            
            if (userMsg.toLowerCase().includes('phone addiction') && !isApkSuggested) {
                setTimeout(() => addApkCard(), 500);
                isApkSuggested = true;
            }
        }
        
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        sendBtn.addEventListener('click', () => sendMessage());
        imgBtn.addEventListener('click', () => {
            const txt = textarea.value.trim();
            if (txt) sendMessage(txt, true);
            else addMessageToUI('ai', 'Kuch likh bhai — "draw a cat" jaise 🎨');
        });
        textarea.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            conversationHistory = [];
            saveHistory();
            chatContainerDiv.innerHTML = '';
            addMessageToUI('ai', `Chat clear kar di bhai ${currentUserName || ''}! Ab naye se backchodi shuru 💀`);
            isApkSuggested = false;
        });
        
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => sendMessage(btn.getAttribute('data-problem')));
        });
        
        speakBtn.addEventListener('click', () => {
            const last = Array.from(chatContainerDiv.querySelectorAll('.message.ai .bubble')).pop();
            if (last) speakText(last.innerText);
            else speakText("Kuch bol bhai");
        });
        
        let isListening = false;
        let recognition = null;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.onresult = (e) => {
                textarea.value = e.results[0][0].transcript;
                micBtn.classList.remove('listening');
                isListening = false;
                setTimeout(() => sendMessage(), 200);
            };
            recognition.onend = () => {
                micBtn.classList.remove('listening');
                isListening = false;
            };
        }
        
        micBtn.addEventListener('click', () => {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
                micBtn.classList.remove('listening');
                isListening = false;
            } else {
                recognition.start();
                micBtn.classList.add('listening');
                isListening = true;
            }
        });
        
        if (conversationHistory.length === 0) {
            addMessageToUI('ai', `Kya haal hai ${currentUserName || 'bhai'}! Main Snocky — tera super sexy backchod dost. 🔥 MODE: ${backchodMode ? 'BACKCHOD' : 'NORMAL'}`);
        } else {
            loadHistory();
        }
        
        console.log('🔥 Snocky AI — Super Sexy Mode Active!');
    </script>
</body>
</html>
