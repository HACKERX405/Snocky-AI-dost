<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snocky AI — Emotional Support + Focus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #0f0f13;
            overflow: hidden;
            color: #ededee;
            transition: background 0.3s ease;
        }

        body.light-mode {
            background: #e8e8f0;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: rgba(10, 10, 15, 0.25);
        }

        .header {
            padding: 0.8rem 1.5rem;
            background: rgba(15, 15, 25, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #a78bfa, #3b82f6, #10b981);
            background-size: 300% 300%;
            animation: gradientShift 6s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo p {
            font-size: 0.65rem;
            color: #a78bfa;
            opacity: 0.8;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .glass-btn {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .glass-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(167,139,250,0.5);
        }

        .logout-btn {
            background: rgba(239,68,68,0.3);
        }

        /* Quote Bar */
        .quote-bar {
            padding: 0.4rem;
            text-align: center;
            font-size: 0.7rem;
            font-style: italic;
            background: linear-gradient(90deg, transparent, rgba(167,139,250,0.1), transparent);
            animation: fadeInOut 8s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Quick Buttons */
        .quick-buttons {
            padding: 0.5rem 1rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .quick-btn {
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(167,139,250,0.1));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3rem;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .quick-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(167,139,250,0.5);
        }

        body.light-mode .quick-btn {
            background: rgba(0,0,0,0.05);
            color: #1a1a2e;
        }

        /* Chat */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            display: flex;
            gap: 0.8rem;
            animation: floatIn 0.4s ease;
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateX(-20px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .message.user { justify-content: flex-end; }
        .message.user .bubble {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-bottom-right-radius: 0.25rem;
        }

        .message.ai .bubble {
            background: rgba(30,30,45,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom-left-radius: 0.25rem;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .user .avatar {
            background: linear-gradient(135deg, #6b7280, #9ca3af);
        }

        .bubble {
            max-width: 75%;
            padding: 0.7rem 1rem;
            border-radius: 1.2rem;
            line-height: 1.4;
            font-size: 0.88rem;
        }

        /* Input */
        .input-area {
            padding: 1rem;
            background: rgba(15,15,25,0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 0.6rem;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: rgba(30,30,45,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 0.7rem 1rem;
            font-family: inherit;
            font-size: 0.88rem;
            color: white;
            resize: none;
            outline: none;
            min-height: 44px;
        }

        textarea:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
        }

        .action-btn {
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            border: none;
            border-radius: 1.5rem;
            padding: 0.7rem 1rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
        }

        .action-btn:hover {
            transform: scale(0.98);
        }

        .mic-btn, .speak-btn {
            border-radius: 50%;
            width: 44px;
            height: 44px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speak-btn {
            background: #10b981;
        }

        .mic-btn.listening {
            background: #ef4444;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 #ef4444; }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239,68,68,0); }
        }

        /* Suggest Card */
        .suggest-card {
            background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(5,150,105,0.1));
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 0.5rem;
            border: 1px solid rgba(16,185,129,0.4);
            animation: cardGlow 2s infinite;
        }

        @keyframes cardGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(16,185,129,0.3); }
            50% { box-shadow: 0 0 20px rgba(16,185,129,0.5); }
        }

        .apk-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 0.5rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        /* Typing */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 5px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .chat-container::-webkit-scrollbar-thumb { background: #a78bfa; border-radius: 10px; }

        @media (max-width: 700px) {
            .header { padding: 0.6rem 1rem; }
            .logo h1 { font-size: 1.2rem; }
            .quick-btn { font-size: 0.65rem; padding: 0.3rem 0.7rem; }
            .bubble { max-width: 85%; font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="app">
        <div class="header">
            <div class="logo">
                <h1>⚡ SNOCKY AI</h1>
                <p>your emotional support • focus companion</p>
            </div>
            <div class="header-actions">
                <button class="glass-btn" id="themeToggleBtn">🎨 Theme</button>
                <button class="glass-btn" id="clearHistoryBtn">🗑️ Clear</button>
                <button class="glass-btn logout-btn" id="logoutBtn">🚪 Exit</button>
            </div>
        </div>

        <div class="quote-bar" id="quoteBar">✨ "You are not alone. I'm here for you." — Snocky</div>

        <div class="quick-buttons">
            <button class="quick-btn" data-problem="feeling anxious">😰 Anxiety</button>
            <button class="quick-btn" data-problem="feeling stressed">😫 Stress</button>
            <button class="quick-btn" data-problem="phone addiction">📱 Phone Addiction</button>
            <button class="quick-btn" data-problem="need motivation">💪 Motivation</button>
            <button class="quick-btn" data-problem="can't focus">🎯 Focus</button>
            <button class="quick-btn" data-problem="feeling lonely">💙 Lonely</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message ai">
                <div class="avatar">⚡</div>
                <div class="bubble">Hey bhai! Main Snocky — tera emotional support companion. Tujhe stress hai, anxiety hai, phone addiction hai? Main sun raha hoon. Bata, kya help chahiye? 🤝💙</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Type how you're feeling..." rows="1"></textarea>
                <button id="speakBtn" class="action-btn speak-btn">🔊</button>
                <button id="micBtn" class="action-btn mic-btn">🎤</button>
                <button id="sendBtn" class="action-btn">✨ Send</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 3D Background
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0f13);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        const group = new THREE.Group();
        
        const geo = new THREE.IcosahedronGeometry(0.8, 0);
        const mat = new THREE.MeshStandardMaterial({
            color: 0xa78bfa,
            emissive: 0x4c1d95,
            emissiveIntensity: 0.3,
            roughness: 0.2,
            metalness: 0.8
        });
        const core = new THREE.Mesh(geo, mat);
        group.add(core);
        
        const wireMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, transparent: true, opacity: 0.2 });
        const wireframe = new THREE.Mesh(geo, wireMat);
        wireframe.scale.set(1.2, 1.2, 1.2);
        group.add(wireframe);
        
        const particleCount = 1200;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 14;
            positions[i*3+1] = (Math.random() - 0.5) * 9;
            positions[i*3+2] = (Math.random() - 0.5) * 12 - 5;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.03, transparent: true, opacity: 0.4 });
        const stars = new THREE.Points(particlesGeo, particleMat);
        group.add(stars);
        
        scene.add(group);
        
        const light1 = new THREE.PointLight(0x3b82f6, 0.8);
        light1.position.set(2, 2, 3);
        scene.add(light1);
        const light2 = new THREE.PointLight(0xa78bfa, 0.6);
        light2.position.set(-2, 1, 4);
        scene.add(light2);
        const ambient = new THREE.AmbientLight(0x1a1a2e);
        scene.add(ambient);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = false;
        controls.enablePan = false;
        
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.003;
            group.rotation.x += 0.002;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============ EMOTIONAL SUPPORT AI ============
        
        const quotes = [
            "💙 You matter more than you know.",
            "🧘 Take a deep breath. You've got this.",
            "🌟 Even the darkest night will end and the sun will rise.",
            "💪 You are stronger than your struggles.",
            "🌱 Small steps every day lead to big changes.",
            "🎯 Focus on what you can control, let go of the rest.",
            "🤝 You are not alone. I'm here for you.",
            "💡 Your potential is endless. Keep going."
        ];
        
        function setRandomQuote() {
            document.getElementById('quoteBar').innerHTML = `✨ "${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        }
        setRandomQuote();
        setInterval(setRandomQuote, 30000);
        
        // Theme
        let isDarkMode = true;
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode', !isDarkMode);
        });
        
        // Speech
        let speechSynthesis = window.speechSynthesis;
        function speakText(text) {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
        
        function vibrate() {
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
        }
        
        const GROQ_API_KEY = "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";
        const APK_URL = "https://static.apkclaw.net/apk/ApkClaw_v0.0.1.apk";
        
        const chatContainerDiv = document.getElementById('chatContainer');
        const textarea = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const speakBtn = document.getElementById('speakBtn');
        
        let isApkSuggested = false;
        let conversationHistory = JSON.parse(localStorage.getItem('snockyChatHistory')) || [
            { role: "system", content: "Tu Snocky hai — ek friendly, empathetic, emotional support AI dost. Hinglish mein baat kar. Tera kaam hai user ki emotional needs samajhna, validation dena, aur practical solutions suggest karna. Jab user stress, anxiety, phone addiction, distraction ki baat kare toh 'ApkClaw' suggest kar. Always be kind, non-judgmental, and supportive. Use emojis like 💙, 🤝, 🧘, 💪 to show empathy." }
        ];
        
        function addMessageToUI(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<div class="avatar">${role === 'ai' ? '⚡' : '你'}</div><div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            chatContainerDiv.appendChild(messageDiv);
            chatContainerDiv.scrollTop = chatContainerDiv.scrollHeight;
        }
        
        function saveChatHistory() {
            localStorage.setItem('snockyChatHistory', JSON.stringify(conversationHistory));
        }
        
        function loadMessagesFromHistory() {
            chatContainerDiv.innerHTML = '';
            let hasUserMessage = false;
            for (let msg of conversationHistory) {
                if (msg.role === 'user') {
                    addMessageToUI('user', msg.content);
                    hasUserMessage = true;
                } else if (msg.role === 'assistant' && msg.content) {
                    addMessageToUI('ai', msg.content);
                }
            }
            if (!hasUserMessage) {
                addMessageToUI('ai', 'Hey bhai! Main Snocky — tera emotional support companion. Tujhe stress hai, anxiety hai, phone addiction hai? Main sun raha hoon. Bata, kya help chahiye? 🤝💙');
            }
        }
        
        function addApkSuggestCard() {
            if (document.getElementById('apkCard') || isApkSuggested) return;
            const cardDiv = document.createElement('div');
            cardDiv.className = 'suggest-card';
            cardDiv.id = 'apkCard';
            cardDiv.innerHTML = `<h4 style="color:#10b981;">📱 Focus Mode — ApkClaw</h4><p style="font-size:0.8rem;">Distraction-free experience. Lock phone, block notifications, stay focused.</p><button class="apk-btn" id="downloadApkBtn">⬇️ Download ApkClaw (Free)</button>`;
            chatContainerDiv.appendChild(cardDiv);
            document.getElementById('downloadApkBtn')?.addEventListener('click', () => window.open(APK_URL, '_blank'));
            isApkSuggested = true;
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `<div class="avatar">⚡</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            chatContainerDiv.appendChild(typingDiv);
            chatContainerDiv.scrollTop = chatContainerDiv.scrollHeight;
        }
        
        function hideTyping() {
            document.getElementById('typingIndicator')?.remove();
        }
        
        // Detect emotional state and distraction
        function needsApkClaw(msg) {
            const lower = msg.toLowerCase();
            const keywords = ['phone addiction', 'distraction', 'screen time', 'phone band', 'focus nahi', 'mobile addiction', 'phone ki lat', 'reels', 'scroll'];
            return keywords.some(k => lower.includes(k));
        }
        
        async function sendMessage(messageText = null) {
            const userMessage = messageText || textarea.value.trim();
            if (!userMessage) return;
            
            vibrate();
            addMessageToUI('user', userMessage);
            textarea.value = '';
            
            conversationHistory.push({ role: "user", content: userMessage });
            saveChatHistory();
            showTyping();
            
            const shouldShowApk = needsApkClaw(userMessage);
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: conversationHistory.slice(-10), temperature: 0.85, max_tokens: 300 })
                });
                hideTyping();
                const data = await response.json();
                let reply = data.choices?.[0]?.message?.content || "I'm here for you. Can you tell me more about how you're feeling? 💙";
                
                conversationHistory.push({ role: "assistant", content: reply });
                saveChatHistory();
                addMessageToUI('ai', reply);
                
                if (shouldShowApk && !isApkSuggested) {
                    setTimeout(() => addApkSuggestCard(), 800);
                }
            } catch (error) {
                hideTyping();
                addMessageToUI('ai', '❌ Internet check kar bhai. Main yahan hoon, phir se try kar 💙');
            }
        }
        
        // Event Listeners
        sendBtn.addEventListener('click', () => sendMessage());
        
        textarea.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            conversationHistory = [{ role: "system", content: conversationHistory[0].content }];
            isApkSuggested = false;
            saveChatHistory();
            chatContainerDiv.innerHTML = '';
            addMessageToUI('ai', 'Chat history cleared! Main yahan hoon, fresh start karte hain. Bata, kaisa feel kar raha hai? 💙');
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('snockyChatHistory');
            localStorage.removeItem('snockyUser');
            window.location.reload();
        });
        
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                sendMessage(btn.getAttribute('data-problem'));
            });
        });
        
        speakBtn.addEventListener('click', () => {
            const lastMsg = Array.from(chatContainerDiv.querySelectorAll('.message.ai .bubble')).pop();
            if (lastMsg) speakText(lastMsg.innerText);
            else speakText("Kuch pucho bhai, main sun raha hoon 💙");
        });
        
        // Voice Input
        let isListening = false;
        let recognition = null;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onresult = (event) => {
                textarea.value = event.results[0][0].transcript;
                micBtn.classList.remove('listening');
                isListening = false;
                setTimeout(() => sendMessage(), 200);
            };
            recognition.onend = () => {
                micBtn.classList.remove('listening');
                isListening = false;
            };
        }
        
        micBtn.addEventListener('click', () => {
            if (!recognition) {
                addMessageToUI('ai', '❌ Voice support nahi. Chrome use kar bhai.');
                return;
            }
            if (isListening) {
                recognition.stop();
                micBtn.classList.remove('listening');
                isListening = false;
            } else {
                recognition.start();
                micBtn.classList.add('listening');
                isListening = true;
            }
        });
        
        loadMessagesFromHistory();
        
        console.log('🔥 Snocky AI — Emotional Support + Focus + ApkClaw Ready!');
    </script>
</body>
</html>
