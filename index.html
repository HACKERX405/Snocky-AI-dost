<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Snocky AI — Backchod Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #0f0f13;
            overflow: hidden;
            color: #ededee;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: rgba(10, 10, 15, 0.25);
        }

        .header {
            padding: 0.7rem 1rem;
            background: rgba(15, 15, 25, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .logo h1 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #a78bfa, #3b82f6, #10b981);
            background-size: 300% 300%;
            animation: gradientShift 6s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo p {
            font-size: 0.55rem;
            color: #a78bfa;
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .glass-btn {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.3rem 0.7rem;
            font-size: 0.65rem;
            color: white;
            cursor: pointer;
        }

        .quote-bar {
            padding: 0.35rem;
            text-align: center;
            font-size: 0.6rem;
            font-style: italic;
            background: linear-gradient(90deg, transparent, rgba(167,139,250,0.1), transparent);
        }

        .quick-buttons {
            padding: 0.5rem 0.8rem;
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .quick-buttons::-webkit-scrollbar {
            display: none;
        }

        .quick-btn {
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(167,139,250,0.1));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            padding: 0.4rem 0.9rem;
            font-size: 0.7rem;
            white-space: nowrap;
            cursor: pointer;
            color: white;
            flex-shrink: 0;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%;
        }

        .message {
            display: flex;
            gap: 0.7rem;
            animation: floatIn 0.3s ease;
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateX(-15px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-bottom-right-radius: 0.2rem;
        }

        .message.ai .bubble {
            background: rgba(30, 30, 45, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 0.2rem;
        }

        .avatar {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .user .avatar {
            background: linear-gradient(135deg, #6b7280, #9ca3af);
        }

        .bubble {
            max-width: 75%;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            line-height: 1.4;
            font-size: 0.85rem;
            word-wrap: break-word;
        }

        .image-message {
            margin-top: 0.5rem;
            max-width: 200px;
            border-radius: 1rem;
            cursor: pointer;
        }

        .image-message img {
            width: 100%;
            border-radius: 1rem;
        }

        .input-area {
            padding: 0.7rem;
            background: rgba(15, 15, 25, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-bottom: max(0.7rem, env(safe-area-inset-bottom, 0.7rem));
        }

        .input-wrapper {
            width: 100%;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }

        textarea {
            flex: 1;
            background: rgba(30, 30, 45, 0.95);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 2rem;
            padding: 0.8rem 1rem;
            font-family: inherit;
            font-size: 0.95rem;
            color: white;
            resize: none;
            outline: none;
            min-height: 2.8rem;
        }

        textarea:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
        }

        .action-btn {
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            border: none;
            border-radius: 2rem;
            padding: 0.75rem 1rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
        }

        .mic-btn, .speak-btn, .img-btn {
            border-radius: 50%;
            width: 2.8rem;
            height: 2.8rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-btn {
            background: #8b5cf6;
        }

        .speak-btn {
            background: #10b981;
        }

        .mic-btn.listening {
            background: #ef4444;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 #ef4444; }
            50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        .suggest-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.1));
            border-radius: 1rem;
            padding: 0.7rem;
            margin-top: 0.5rem;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .apk-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 2rem;
            padding: 0.6rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 5px 0;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .chat-container::-webkit-scrollbar {
            width: 3px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #a78bfa;
            border-radius: 10px;
        }

        body.light-mode .bubble,
        body.light-mode .ai .bubble {
            background: rgba(255, 255, 255, 0.9);
            color: #1a1a2e;
        }
        body.light-mode textarea {
            background: white;
            color: #1a1a2e;
            border-color: #ddd;
        }

        @media (min-width: 1024px) {
            .chat-container {
                max-width: 800px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="app">
        <div class="header">
            <div class="logo">
                <h1>⚡ SNOCKY AI — BACKCHOD MODE</h1>
                <p>bhai wala pyaar • limited gaali • full masti</p>
            </div>
            <div class="header-actions">
                <button class="glass-btn" id="themeToggleBtn">🎨 Theme</button>
                <button class="glass-btn" id="clearHistoryBtn">🗑️ Clear</button>
            </div>
        </div>

        <div class="quote-bar" id="quoteBar">💀 "Gaali nahi, pyaar hai bhai" — Snocky</div>

        <div class="quick-buttons">
            <button class="quick-btn" data-problem="bhai kaisa hai">😎 Kaise ho bhai?</button>
            <button class="quick-btn" data-problem="padhai nahi ho rahi">📚 Padhai nahi ho rahi</button>
            <button class="quick-btn" data-problem="phone addiction">📱 Phone addiction</button>
            <button class="quick-btn" data-problem="girlfriend nahi ban rahi">💔 Girlfriend nahi</button>
            <button class="quick-btn" data-problem="draw a dank meme">🎨 Draw meme</button>
            <button class="quick-btn" data-problem="tu pagal hai">🤪 Tu pagal hai</button>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message ai">
                <div class="avatar">⚡</div>
                <div class="bubble">Kya haal hai bhai? Main Snocky — tera backchod dost. Gaali dunga thoda, mazak udaaunga, par help bhi karunga. Bol, kya lafda hai? 😎💪</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Bol bhai, kya backchodi hai..." rows="1"></textarea>
                <button id="imgBtn" class="action-btn img-btn">🎨</button>
                <button id="speakBtn" class="action-btn speak-btn">🔊</button>
                <button id="micBtn" class="action-btn mic-btn">🎤</button>
                <button id="sendBtn" class="action-btn">Send</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 3D Background
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0f13);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        const group = new THREE.Group();
        const geo = new THREE.IcosahedronGeometry(0.8, 0);
        const mat = new THREE.MeshStandardMaterial({ color: 0xa78bfa, emissive: 0x4c1d95, emissiveIntensity: 0.3 });
        const core = new THREE.Mesh(geo, mat);
        group.add(core);
        
        const wireframe = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, transparent: true, opacity: 0.2 }));
        wireframe.scale.set(1.2, 1.2, 1.2);
        group.add(wireframe);
        
        const particleCount = 800;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 14;
            positions[i*3+1] = (Math.random() - 0.5) * 9;
            positions[i*3+2] = (Math.random() - 0.5) * 12 - 5;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const stars = new THREE.Points(particlesGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.03, transparent: true, opacity: 0.4 }));
        group.add(stars);
        
        scene.add(group);
        
        const light1 = new THREE.PointLight(0x3b82f6, 0.8);
        light1.position.set(2, 2, 3);
        scene.add(light1);
        const light2 = new THREE.PointLight(0xa78bfa, 0.6);
        light2.position.set(-2, 1, 4);
        scene.add(light2);
        scene.add(new THREE.AmbientLight(0x1a1a2e));
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.enableZoom = false;
        
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.002;
            group.rotation.x += 0.001;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============ BACKCHOD AI WITH LIMITED GAALI ============
        
        const quotes = [
            "💀 Gaali dunga, par pyaar se",
            "🔥 Teri backchodi ka jawab nahi",
            "😎 Bhai wala pyaar",
            "🤣 Tu pagal hai, par mera pagal hai"
        ];
        
        function setRandomQuote() {
            document.getElementById('quoteBar').innerHTML = `✨ "${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        }
        setRandomQuote();
        setInterval(setRandomQuote, 30000);
        
        let isDarkMode = true;
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode', !isDarkMode);
        });
        
        function speakText(text) {
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hi-IN';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
        
        function vibrate() {
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(50);
        }
        
        const GROQ_API_KEY = "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";
        const APK_URL = "https://static.apkclaw.net/apk/ApkClaw_v0.0.1.apk";
        
        const chatContainerDiv = document.getElementById('chatContainer');
        const textarea = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const speakBtn = document.getElementById('speakBtn');
        const imgBtn = document.getElementById('imgBtn');
        
        let isApkSuggested = false;
        let conversationHistory = JSON.parse(localStorage.getItem('snockyChatHistory')) || [
            { role: "system", content: "Tu Snocky hai — backchod AI. Thoda gaali de sakta hai (bhai wali: bhadwa, chutiya, madarchod - limit mein). Hinglish mein baat kar. Mazaak uda, sarcasm kar, lekin help bhi kar. 'draw', 'image' pe image generate kar. Bakiyon ka normal jawab de. Comedy aur solution dono hona chahiye. Example: 'Bhai teri problem sun li, thoda dimag laga. Ye kar - first step... nahi hua toh mai aake teri gaand maarunga 😂'" }
        ];
        
        function addMessageToUI(role, text, isImage = false, imageUrl = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            let content = '';
            if (isImage && imageUrl) {
                content = `<div class="bubble">${text}<br><div class="image-message"><img src="${imageUrl}" alt="Generated" loading="lazy"></div></div>`;
            } else {
                content = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
            }
            messageDiv.innerHTML = `<div class="avatar">${role === 'ai' ? '⚡' : '你'}</div>${content}`;
            chatContainerDiv.appendChild(messageDiv);
            chatContainerDiv.scrollTop = chatContainerDiv.scrollHeight;
        }
        
        function saveChatHistory() {
            localStorage.setItem('snockyChatHistory', JSON.stringify(conversationHistory));
        }
        
        function loadMessagesFromHistory() {
            chatContainerDiv.innerHTML = '';
            for (let msg of conversationHistory) {
                if (msg.role === 'user') {
                    addMessageToUI('user', msg.content);
                } else if (msg.role === 'assistant' && msg.content) {
                    addMessageToUI('ai', msg.content);
                }
            }
        }
        
        function addApkSuggestCard() {
            if (document.getElementById('apkCard')) return;
            const cardDiv = document.createElement('div');
            cardDiv.className = 'suggest-card';
            cardDiv.id = 'apkCard';
            cardDiv.innerHTML = `<h4 style="color:#10b981;">📱 ApkClaw</h4><button class="apk-btn" id="downloadApkBtn">⬇️ Download</button>`;
            chatContainerDiv.appendChild(cardDiv);
            document.getElementById('downloadApkBtn')?.addEventListener('click', () => window.open(APK_URL, '_blank'));
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `<div class="avatar">⚡</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            chatContainerDiv.appendChild(typingDiv);
            chatContainerDiv.scrollTop = chatContainerDiv.scrollHeight;
        }
        
        function hideTyping() {
            document.getElementById('typingIndicator')?.remove();
        }
        
        function isDrawingRequest(msg) {
            const lower = msg.toLowerCase();
            const drawKeywords = ['draw', 'generate', 'make a', 'create', 'picture', 'image', 'meme', 'cat', 'dog'];
            return drawKeywords.some(k => lower.includes(k));
        }
        
        function extractPrompt(msg) {
            let prompt = msg;
            const removeWords = ['draw', 'generate', 'make a', 'create a', 'picture of', 'image of', 'please'];
            for (let word of removeWords) {
                prompt = prompt.replace(new RegExp(word, 'gi'), '');
            }
            return prompt.trim().substring(0, 200) || msg;
        }
        
        async function generateImage(prompt) {
            const encodedPrompt = encodeURIComponent(prompt);
            return `https://image.pollinations.ai/prompt/${encodedPrompt}?width=512&height=512&nologo=true`;
        }
        
        async function getBackchodResponse(userMessage) {
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ 
                        model: 'llama-3.3-70b-versatile', 
                        messages: [{ role: "system", content: "You are Snocky, a backchod Indian friend. You give limited gaali (bhadwa, chutiya, madarchod - but end me solution bhi de). Be funny, sarcastic, help also. Reply in Hinglish. Example: 'Bhai teri problem sun li. Ab ye kar... nahi hua toh teri gaand maarunga 😂'" }, { role: "user", content: userMessage }], 
                        temperature: 0.9, 
                        max_tokens: 250 
                    })
                });
                const data = await response.json();
                return data.choices?.[0]?.message?.content || "Bhai main sun raha hu. Bol kya chahiye, nahi toh chup chap baith 😂";
            } catch (error) {
                return "❌ Internet check kar bhai. Phir se bol, nahi toh gaand tod dunga 😂";
            }
        }
        
        async function sendMessage(messageText = null, forceImage = false) {
            let userMessage = messageText || textarea.value.trim();
            if (!userMessage) return;
            
            vibrate();
            addMessageToUI('user', userMessage);
            textarea.value = '';
            textarea.style.height = 'auto';
            
            conversationHistory.push({ role: "user", content: userMessage });
            saveChatHistory();
            
            const isDrawRequest = forceImage || isDrawingRequest(userMessage);
            
            if (isDrawRequest) {
                const prompt = extractPrompt(userMessage);
                addMessageToUI('ai', `🎨 Bola to bana dunga... "${prompt}" 😎`);
                try {
                    const imageUrl = await generateImage(prompt);
                    addMessageToUI('ai', `Le bhai, teri demand complete 🖼️✨`, true, imageUrl);
                    conversationHistory.push({ role: "assistant", content: `[Generated image: ${prompt}]` });
                    saveChatHistory();
                } catch (err) {
                    addMessageToUI('ai', '❌ Image nahi bana paaya bhai. Phir try kar 😅');
                }
                return;
            }
            
            showTyping();
            const reply = await getBackchodResponse(userMessage);
            hideTyping();
            addMessageToUI('ai', reply);
            conversationHistory.push({ role: "assistant", content: reply });
            saveChatHistory();
            
            if (userMessage.toLowerCase().includes('phone addiction') && !isApkSuggested) {
                setTimeout(() => addApkSuggestCard(), 500);
            }
        }
        
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        sendBtn.addEventListener('click', () => sendMessage());
        
        imgBtn.addEventListener('click', () => {
            const prompt = textarea.value.trim();
            if (prompt) sendMessage(prompt, true);
            else addMessageToUI('ai', 'Kuch likh bhai — "draw a cat" jaise 🎨');
        });
        
        textarea.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            conversationHistory = [];
            saveChatHistory();
            chatContainerDiv.innerHTML = '';
            addMessageToUI('ai', 'Chat clear kar di bhai. Ab naye se backchodi shuru 💀');
        });
        
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                sendMessage(btn.getAttribute('data-problem'));
            });
        });
        
        speakBtn.addEventListener('click', () => {
            const lastMsg = Array.from(chatContainerDiv.querySelectorAll('.message.ai .bubble')).pop();
            if (lastMsg) speakText(lastMsg.innerText);
            else speakText("Kuch bol bhai");
        });
        
        // Voice Input
        let isListening = false;
        let recognition = null;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.onresult = (event) => {
                textarea.value = event.results[0][0].transcript;
                micBtn.classList.remove('listening');
                isListening = false;
                setTimeout(() => sendMessage(), 200);
            };
            recognition.onend = () => {
                micBtn.classList.remove('listening');
                isListening = false;
            };
        }
        
        micBtn.addEventListener('click', () => {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
                micBtn.classList.remove('listening');
                isListening = false;
            } else {
                recognition.start();
                micBtn.classList.add('listening');
